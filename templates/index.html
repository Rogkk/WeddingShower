<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Cozinha</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- HERO -->
    <section class="hero">

        <img src="{{ url_for('static', filename='img/casal.jpg') }}" alt="Casal">
        
        <div class="overlay">

            <div class="hero-content">

                <h2 class="couple">
                    Tamires & Daniel
                </h2>

                <h1>
                    Chá de Cozinha
                </h1>

                <div class="divider"></div>

                <p class="event-date">
                    18 de Julho de 2026
                </p>

                <div class="divider"></div>

                <br>
                <p class="event-location">
                    Local: A confirmar
                </p>

                <br><br>
                <p class="event-text">
                    Sua presença é muito importante para nós.
                    Escolha um presente da lista abaixo para
                    nos ajudar a construir nosso novo lar.
                </p>

            </div>

        </div>

    </section>

    <!-- FORMULÁRIO -->
    <section class="form-section">

        <div class="container">

            <h2>Escolha seu presente</h2>

            <form id="giftForm">

                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome"
                    required
                >

                <select id="presente" required>
                    <option value="">Carregando presentes...</option>
                </select>

                <button type="submit">
                    Confirmar Presente
                </button>

            </form>

            <div id="mensagem"></div>

        </div>

    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
</body>
</html>
